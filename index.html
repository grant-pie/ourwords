<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>our words</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #f9b8cc;
    --lavender: #d4b8f9;
    --mint: #b8f0e0;
    --peach: #f9d4b8;
    --sky: #b8d4f9;
    --cream: #fdf6f0;
    --text: #5a3e50;
    --soft: #c4a0b4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Quicksand', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    color: var(--text);
    overflow-x: hidden;
  }

  /* Decorative blobs */
  body::before {
    content: '';
    position: fixed;
    top: -120px; left: -120px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, #f9b8cc55, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px; right: -100px;
    width: 350px; height: 350px;
    background: radial-gradient(circle, #d4b8f955, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 2.8rem;
    color: var(--text);
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  header p {
    color: var(--soft);
    font-size: 0.95rem;
    font-weight: 500;
  }

  .hearts {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 10px;
    font-size: 1.1rem;
    opacity: 0.7;
  }

  /* Input panel */
  .input-panel {
    background: white;
    border-radius: 24px;
    padding: 32px;
    box-shadow: 0 4px 30px rgba(180, 120, 160, 0.1);
    margin-bottom: 32px;
    border: 1.5px solid #f0e0ea;
  }

  .input-panel label {
    display: block;
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--soft);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  /* Drop zone */
  .drop-zone {
    width: 100%;
    border: 2px dashed #f0dde8;
    border-radius: 16px;
    padding: 44px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: #fdf9fc;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--pink);
    background: #fdf0f5;
  }

  .drop-zone input[type="file"] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }

  .dz-emoji { font-size: 2.2rem; display: block; margin-bottom: 10px; }

  .dz-title {
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text);
    margin-bottom: 4px;
  }

  .dz-sub { font-size: 0.82rem; color: var(--soft); }

  .file-status {
    margin-top: 12px;
    font-size: 0.85rem;
    font-weight: 600;
    min-height: 1.2em;
    text-align: center;
    transition: color 0.2s;
  }

  /* Image preview thumbnail */
  .img-preview-wrap {
    display: none;
    margin-top: 16px;
    border-radius: 14px;
    overflow: hidden;
    border: 1.5px solid #f0dde8;
  }
  .img-preview-wrap.visible { display: block; }
  .img-preview-wrap img { width: 100%; display: block; }

  .options-row {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 20px;
    align-items: flex-end;
  }

  .option-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 140px;
  }

  .option-group label { margin-bottom: 0; }

  input[type="text"], input[type="number"], select {
    padding: 10px 14px;
    border: 1.5px solid #f0dde8;
    border-radius: 12px;
    font-family: 'Quicksand', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    background: #fdf9fc;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input[type="text"]:focus,
  input[type="number"]:focus,
  select:focus { border-color: var(--pink); }

  .btn {
    padding: 12px 28px;
    border: none;
    border-radius: 50px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--pink), var(--lavender));
    color: white;
    box-shadow: 0 4px 16px rgba(249, 184, 204, 0.5);
    margin-top: 8px;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(249, 184, 204, 0.6);
  }

  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-secondary {
    background: transparent;
    color: var(--soft);
    border: 1.5px solid #f0dde8;
    margin-top: 8px;
  }

  .btn-secondary:hover {
    background: #fdf0f5;
    border-color: var(--pink);
  }

  .btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 20px;
  }

  /* Loader */
  .loader {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 36px;
    text-align: center;
  }
  .loader.active { display: flex; }

  .loader-spinner {
    width: 38px; height: 38px;
    border: 3px solid #f0dde8;
    border-top-color: var(--pink);
    border-radius: 50%;
    animation: spin 0.85s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    color: var(--soft);
    font-size: 0.9rem;
    font-weight: 500;
    font-style: italic;
  }

  /* Cloud output */
  .cloud-panel {
    background: white;
    border-radius: 24px;
    padding: 40px 32px;
    box-shadow: 0 4px 30px rgba(180, 120, 160, 0.1);
    border: 1.5px solid #f0e0ea;
    display: none;
    animation: fadeUp 0.5s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cloud-title {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.5rem;
    margin-bottom: 8px;
    color: var(--text);
  }

  .cloud-subtitle {
    text-align: center;
    color: var(--soft);
    font-size: 0.85rem;
    margin-bottom: 32px;
  }

  #cloud-canvas {
    display: block;
    width: 100%;
    border-radius: 16px;
    background: var(--cream);
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .stat { text-align: center; }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--pink);
    display: block;
  }

  .stat-label {
    font-size: 0.78rem;
    color: var(--soft);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .top-words {
    margin-top: 28px;
    text-align: center;
  }

  .top-words h3 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.1rem;
    margin-bottom: 14px;
    color: var(--text);
  }

  .word-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .pill {
    padding: 6px 14px;
    border-radius: 50px;
    font-size: 0.85rem;
    font-weight: 600;
  }

  /* Floating hearts animation */
  .floating-heart {
    position: fixed;
    font-size: 1.2rem;
    opacity: 0;
    animation: floatUp 3s ease forwards;
    pointer-events: none;
    z-index: 999;
  }

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-180px) scale(1.4); }
  }

  .privacy-note {
    margin-top: 16px;
    font-size: 0.8rem;
    color: #d4b0c0;
    text-align: center;
  }

  .nav-link {
    display: inline-block;
    margin-top: 8px;
    font-size: 0.82rem;
    color: var(--soft);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-link:hover { color: var(--text); }

  @media (max-width: 500px) {
    header h1 { font-size: 2rem; }
    .input-panel, .cloud-panel { padding: 22px 16px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>our words</h1>
    <p>every word we ever sent</p>
    <div class="hearts">🌸 ✨ 💌 ✨ 🌸</div>
    <div style="margin-top: 12px;">
      <a class="nav-link" href="chat-to-image.html">← make a chat image first</a>
    </div>
  </header>

  <!-- Upload panel -->
  <div class="input-panel">
    <label>upload your chat screenshot</label>

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="img-file" accept="image/*">
      <span class="dz-emoji">🖼️</span>
      <div class="dz-title">drop your chat image here</div>
      <div class="dz-sub">PNG or JPG · from chat.snap or any WhatsApp screenshot</div>
    </div>

    <div class="file-status" id="file-status"></div>

    <div class="img-preview-wrap" id="preview-wrap">
      <img id="img-preview" alt="chat preview">
    </div>

    <div class="options-row">
      <div class="option-group">
        <label for="cloud-title">title</label>
        <input type="text" id="cloud-title" value="our words" placeholder="our words">
      </div>
      <div class="option-group">
        <label for="palette">colour palette</label>
        <select id="palette">
          <option value="pastel">pastel 🌸</option>
          <option value="rose">rose 🌹</option>
          <option value="sky">sky 🌤</option>
          <option value="mint">mint 🌿</option>
          <option value="sunset">sunset 🌅</option>
        </select>
      </div>
      <div class="option-group">
        <label for="max-words">max words</label>
        <input type="number" id="max-words" value="80" min="10" max="200">
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="gen-btn" onclick="generateFromImage()" disabled>generate ✨</button>
    </div>

    <p class="privacy-note">🔒 your image is sent only to claude ai for text extraction — never stored</p>
  </div>

  <!-- Loader -->
  <div class="loader" id="loader">
    <div class="loader-spinner"></div>
    <div class="loader-text" id="loader-text">reading your chat image…</div>
  </div>

  <!-- Cloud output -->
  <div class="cloud-panel" id="cloud-panel">
    <div class="cloud-title" id="output-title">our words</div>
    <div class="cloud-subtitle" id="output-subtitle"></div>
    <canvas id="cloud-canvas" width="600" height="600" style="max-width:100%;border-radius:16px;"></canvas>

    <div class="stats-row" id="stats-row"></div>

    <div class="top-words">
      <h3>your most-used words</h3>
      <div class="word-pills" id="word-pills"></div>
    </div>

    <div class="btn-row" style="justify-content: center; margin-top: 28px;">
      <button class="btn btn-primary" onclick="downloadCloud()">save as image 💾</button>
      <button class="btn btn-secondary" onclick="resetCloud()">start over</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let uploadedImageDataURL = null;

// ─── DROP ZONE ───────────────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('img-file');
const fileStatus = document.getElementById('file-status');

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) loadImage(fileInput.files[0]);
});

function loadImage(file) {
  if (!file.type.startsWith('image/')) {
    fileStatus.textContent = '⚠️ please upload an image file (PNG or JPG)';
    fileStatus.style.color = '#e87890';
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    uploadedImageDataURL = e.target.result;
    fileStatus.textContent = `✓ ${file.name} loaded`;
    fileStatus.style.color = '#45c4a0';
    document.getElementById('img-preview').src = uploadedImageDataURL;
    document.getElementById('preview-wrap').classList.add('visible');
    document.getElementById('gen-btn').disabled = false;
  };
  reader.readAsDataURL(file);
}

// ─── PALETTES ────────────────────────────────────────────────────────────────
const PALETTES = {
  pastel:  ['#f9b8cc','#d4b8f9','#b8d4f9','#b8f0e0','#f9d4b8','#f0b8f9','#f9f0b8','#b8f9d4'],
  rose:    ['#f7a8b8','#f4c2c2','#e8a0b4','#d4687c','#f9c8d4','#e87890','#f0a0b0','#c45068'],
  sky:     ['#b8d4f9','#d4b8f9','#b8e8f9','#98c4f0','#c8b0f0','#88b8e8','#a8c0f8','#b0a0e0'],
  mint:    ['#b8f0e0','#f9d4b8','#a8e8d0','#f0e8a8','#c8f0c8','#f8d0a8','#98ddc8','#f0c898'],
  sunset:  ['#f9d4a8','#f9b898','#f0a888','#f8c8b0','#f0b880','#e89870','#f8d890','#f0c870'],
};

const PILL_COLORS = [
  {bg:'#fde8ef',color:'#c45068'},
  {bg:'#ede8fd',color:'#6045c4'},
  {bg:'#e8f0fd',color:'#4568c4'},
  {bg:'#e8fdf5',color:'#45c4a0'},
  {bg:'#fdf3e8',color:'#c48045'},
];

// ─── STOP WORDS ──────────────────────────────────────────────────────────────
const STOP_WORDS = new Set([
  'i','me','my','myself','we','our','ours','ourselves','you','your','yours',
  'yourself','he','him','his','himself','she','her','hers','herself','it',
  'its','itself','they','them','their','theirs','themselves','what','which',
  'who','whom','this','that','these','those','am','is','are','was','were',
  'be','been','being','have','has','had','having','do','does','did','doing',
  'a','an','the','and','but','if','or','because','as','until','while','of',
  'at','by','for','with','about','against','between','into','through',
  'during','before','after','above','below','to','from','up','down','in',
  'out','on','off','over','under','again','further','then','once','here',
  'there','when','where','why','how','all','both','each','few','more','most',
  'other','some','such','no','nor','not','only','own','same','so','than',
  'too','very','s','t','can','will','just','don','should','now','d','ll',
  'm','o','re','ve','y','ain','aren','couldn','didn','doesn','hadn','hasn',
  'haven','isn','ma','mightn','mustn','needn','shan','shouldn','wasn',
  'weren','won','wouldn','gonna','gotta','im','ive','youre','theyre',
  'thats','its','dont','cant','wont','doesnt','didnt','wasnt',
  'could','may','might','must','shall','would','ought','need','dare',
  'ok','okay','yeah','yep','nope','lol','haha','hahaha','omg','tbh',
  'idk','imo','bc','cuz','cause','like','just','get','got','go','going',
  'know','think','want','one','time','way','day','good','really','even',
  'back','see','come','make','said','say','things','thing','well','still',
  'also','came','went','getting','let','putting','maybe','nah','oh','ah',
  'um','uh','hmm','yes','no','hey','hi','hello','bye','sure','wow','nice',
  'great','thanks','thank','sorry','please','np','ty','ur','u','r','w',
  'n','b','c','k','x','media','omitted','message','deleted','edited',
  'pm','am','nan','photo','video','sticker','audio','file','link',
]);

function tokenize(text) {
  return text.toLowerCase()
    .replace(/[^\w\s']/g,' ')
    .split(/\s+/)
    .map(w => w.replace(/^'+|'+$/g,''))
    .filter(w =>
      w.length > 2 &&
      !STOP_WORDS.has(w) &&
      !/^\d+$/.test(w) &&
      !w.includes("'")
    );
}

function getFreq(tokens) {
  const freq = {};
  tokens.forEach(w => freq[w] = (freq[w]||0) + 1);
  return Object.entries(freq).sort((a,b) => b[1]-a[1]);
}

// ─── GENERATE FROM IMAGE ─────────────────────────────────────────────────────
async function generateFromImage() {
  if (!uploadedImageDataURL) return;

  const loader = document.getElementById('loader');
  const loaderText = document.getElementById('loader-text');
  const cloudPanel = document.getElementById('cloud-panel');

  cloudPanel.style.display = 'none';
  loader.classList.add('active');
  document.getElementById('gen-btn').disabled = true;

  const messages = [
    'reading your chat image…',
    'asking claude to find your words…',
    'almost there, counting every word…',
  ];
  let mi = 0;
  const msgTimer = setInterval(() => {
    loaderText.textContent = messages[Math.min(++mi, messages.length - 1)];
  }, 2600);

  try {
    const base64 = uploadedImageDataURL.split(',')[1];
    const mediaType = uploadedImageDataURL.split(';')[0].split(':')[1];

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: mediaType, data: base64 }
            },
            {
              type: 'text',
              text: `This is a WhatsApp chat screenshot. Extract ALL the message text from the chat bubbles.
Return ONLY the raw message words — one message per line.
Do NOT include: timestamps, sender names, date banners, system messages, or any explanation.
Just the pure message content as written in the bubbles.`
            }
          ]
        }]
      })
    });

    clearInterval(msgTimer);

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const data = await response.json();
    const extractedText = data.content
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join(' ');

    const tokens = tokenize(extractedText);
    if (tokens.length === 0) throw new Error('no words found — try a clearer screenshot');

    const maxWords = parseInt(document.getElementById('max-words').value) || 80;
    const freq = getFreq(tokens);
    const words = freq.slice(0, maxWords);
    const palette = PALETTES[document.getElementById('palette').value];
    const titleVal = document.getElementById('cloud-title').value || 'our words';

    const uniqueWords = freq.length;
    const totalWords = tokens.length;
    const topWord = freq[0]?.[0] || '';

    document.getElementById('output-title').textContent = titleVal;
    document.getElementById('output-subtitle').textContent =
      `${totalWords.toLocaleString()} words · ${uniqueWords.toLocaleString()} unique`;

    document.getElementById('stats-row').innerHTML = [
      [totalWords.toLocaleString(), 'total words'],
      [uniqueWords.toLocaleString(), 'unique words'],
      [topWord, 'most said'],
    ].map(([n,l]) =>
      `<div class="stat"><span class="stat-num">${n}</span><span class="stat-label">${l}</span></div>`
    ).join('');

    document.getElementById('word-pills').innerHTML = freq.slice(0,12).map(([w,c],i) => {
      const col = PILL_COLORS[i % PILL_COLORS.length];
      return `<span class="pill" style="background:${col.bg};color:${col.color}">${w} <b>${c}</b></span>`;
    }).join('');

    drawCloud(words, palette);

    loader.classList.remove('active');
    cloudPanel.style.display = 'block';
    cloudPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    spawnHearts();

  } catch (err) {
    clearInterval(msgTimer);
    loader.classList.remove('active');
    fileStatus.textContent = `⚠️ ${err.message}`;
    fileStatus.style.color = '#e87890';
    console.error(err);
  }

  document.getElementById('gen-btn').disabled = false;
}

// ─── DRAW HEART (path helper) ─────────────────────────────────────────────────
function heartPath(ctx, cx, cy, size) {
  // A smooth heart shape centred at (cx, cy) with given half-size
  const s = size;
  ctx.beginPath();
  ctx.moveTo(cx, cy + s * 0.35);
  ctx.bezierCurveTo(cx,          cy - s * 0.1,  cx - s * 1.1, cy - s * 0.9,  cx - s * 0.8, cy - s * 0.45);
  ctx.bezierCurveTo(cx - s * 0.5, cy - s * 1.05, cx,           cy - s * 0.55, cx,            cy + s * 0.35);
  ctx.bezierCurveTo(cx,           cy - s * 0.55, cx + s * 0.5, cy - s * 1.05, cx + s * 0.8,  cy - s * 0.45);
  ctx.bezierCurveTo(cx + s * 1.1, cy - s * 0.9,  cx,           cy - s * 0.1,  cx,            cy + s * 0.35);
  ctx.closePath();
}

// ─── DRAW CLOUD (QR-style heart grid) ────────────────────────────────────────
function drawCloud(words, palette) {
  const canvas = document.getElementById('cloud-canvas');
  const ctx = canvas.getContext('2d');

  // Make it square like a QR code
  const SIZE = 600;
  canvas.width  = SIZE;
  canvas.height = SIZE;
  const W = SIZE, H = SIZE;

  // ── Background ──
  ctx.fillStyle = '#fdf6f0';
  ctx.fillRect(0, 0, W, H);

  // ── Grid setup ──
  const COLS = 29;          // odd number so there's a true centre cell
  const ROWS = 29;
  const CELL = W / COLS;    // cell size in px
  const MARGIN = CELL * 0.12; // breathing room inside each cell

  const maxCount = words[0][1];
  const minCount = words[words.length - 1][1];

  // Map word index → grid cell (row-major, shuffled so common words spread out)
  // We'll fill the grid with word indices; empty cells get a tiny faint heart
  const totalCells = COLS * ROWS;
  const wordCount   = words.length;

  // Build a seeded-shuffle of cell indices so the pattern looks organic
  const cellOrder = Array.from({length: totalCells}, (_, i) => i);
  // Simple deterministic shuffle using word frequencies as seed
  for (let i = cellOrder.length - 1; i > 0; i--) {
    const seed = (words[i % wordCount]?.[1] ?? 1) * 9301 + 49297;
    const j = Math.abs(seed) % (i + 1);
    [cellOrder[i], cellOrder[j]] = [cellOrder[j], cellOrder[i]];
  }

  // Assign words to cells — more frequent words get more cells
  // Weight: cell share proportional to sqrt(count) so common words dominate but not overwhelm
  const weights = words.map(([,c]) => Math.sqrt(c));
  const totalW  = weights.reduce((a, b) => a + b, 0);
  const cellMap  = new Array(totalCells).fill(-1); // -1 = background cell

  let cellIdx = 0;
  words.forEach(([, count], wi) => {
    const share = Math.round((weights[wi] / totalW) * totalCells);
    for (let k = 0; k < share && cellIdx < totalCells; k++, cellIdx++) {
      cellMap[cellOrder[cellIdx]] = wi;
    }
  });

  // ── Corner finder squares (QR-style) — 3 large nested hearts ──
  function drawFinderHeart(cx, cy, outerR) {
    // Outer filled heart (dark)
    ctx.fillStyle = palette[0];
    ctx.globalAlpha = 1;
    heartPath(ctx, cx, cy, outerR);
    ctx.fill();

    // White ring
    ctx.fillStyle = '#fdf6f0';
    heartPath(ctx, cx, cy, outerR * 0.65);
    ctx.fill();

    // Inner filled heart (dark)
    ctx.fillStyle = palette[1];
    heartPath(ctx, cx, cy, outerR * 0.38);
    ctx.fill();

    ctx.globalAlpha = 1;
  }

  const finderR    = CELL * 3.1;
  const finderOff  = CELL * 3.5; // centre offset from corner

  // Reserve corner cells so word hearts don't draw over finders
  const reservedCells = new Set();
  function reserveCorner(startCol, startRow) {
    for (let dr = -1; dr <= 7; dr++) {
      for (let dc = -1; dc <= 7; dc++) {
        const r = startRow + dr, c = startCol + dc;
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
          reservedCells.add(r * COLS + c);
        }
      }
    }
  }
  reserveCorner(0, 0);
  reserveCorner(COLS - 7, 0);
  reserveCorner(0, ROWS - 7);

  // ── Draw all word-hearts first ──
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const cellI = row * COLS + col;
      if (reservedCells.has(cellI)) continue;

      const cx = (col + 0.5) * CELL;
      const cy = (row + 0.5) * CELL;

      const wi = cellMap[cellI];

      if (wi === -1) {
        // Background cell — tiny faint heart
        ctx.fillStyle = 'rgba(196,160,180,0.13)';
        ctx.globalAlpha = 1;
        heartPath(ctx, cx, cy, CELL * 0.18);
        ctx.fill();
      } else {
        const [word, count] = words[wi];
        const color = palette[wi % palette.length];

        // Size: bigger hearts for more frequent words
        const norm = maxCount === minCount ? 0.7
          : 0.32 + 0.52 * Math.pow((count - minCount) / (maxCount - minCount), 0.5);
        const heartR = (CELL / 2 - MARGIN) * norm;

        ctx.fillStyle = color;
        ctx.globalAlpha = 0.55 + 0.45 * (count / maxCount);
        heartPath(ctx, cx, cy, heartR);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }

  // ── Draw finder hearts on top ──
  drawFinderHeart(finderOff,          finderOff,          finderR);
  drawFinderHeart(W - finderOff,      finderOff,          finderR);
  drawFinderHeart(finderOff,          H - finderOff,      finderR);

  // ── Timing pattern: alternating small hearts along row 6 & col 6 ──
  const timingColor1 = palette[2];
  const timingColor2 = 'rgba(196,160,180,0.2)';
  for (let i = 7; i < COLS - 7; i++) {
    const fill = i % 2 === 0;
    // Horizontal
    ctx.fillStyle = fill ? timingColor1 : timingColor2;
    ctx.globalAlpha = fill ? 0.7 : 1;
    heartPath(ctx, (i + 0.5) * CELL, 6.5 * CELL, CELL * 0.2);
    ctx.fill();
    // Vertical
    heartPath(ctx, 6.5 * CELL, (i + 0.5) * CELL, CELL * 0.2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // ── Centre alignment pattern (small) ──
  const acx = W / 2, acy = H / 2;
  ctx.fillStyle = palette[3 % palette.length];
  ctx.globalAlpha = 0.85;
  heartPath(ctx, acx, acy, CELL * 1.4);
  ctx.fill();
  ctx.fillStyle = '#fdf6f0';
  heartPath(ctx, acx, acy, CELL * 0.9);
  ctx.fill();
  ctx.fillStyle = palette[4 % palette.length];
  heartPath(ctx, acx, acy, CELL * 0.46);
  ctx.fill();
  ctx.globalAlpha = 1;

  // ── Subtle border ──
  ctx.strokeStyle = 'rgba(196,160,180,0.25)';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(1, 1, W - 2, H - 2);
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function downloadCloud() {
  const canvas = document.getElementById('cloud-canvas');
  const link = document.createElement('a');
  link.download = 'our-words.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function resetCloud() {
  document.getElementById('cloud-panel').style.display = 'none';
  document.getElementById('gen-btn').disabled = !uploadedImageDataURL;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function spawnHearts() {
  const emojis = ['♡','🌸','✨','💕','🌷'];
  for (let i=0; i<8; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'floating-heart';
      el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      el.style.left = (20+Math.random()*60)+'vw';
      el.style.top = (40+Math.random()*30)+'vh';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }, i*200);
  }
}
